name: Deploy Test to GitHub Pages

on:
  push:
    branches: [main]

# Sadece test reposunda çalışsın
# Bu dosya ana repoya push edilmez

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_BASE_PATH: /hebleani-test/
          VITE_USE_SUPABASE: 'false'

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true
